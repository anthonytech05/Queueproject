<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk to an Advisor</title>
    <link rel="stylesheet" href="advisor.css">
</head>
<body>
    

  <div class="container">
    <div class="card">

      <a href="index.html" class="back-btn">&#8592; Back to Home</a>

      <div class="card-header">
        <h2>Talk to an Advisor</h2>
        <p>Fill in the form below and an advisor will get back to you shortly.</p>
      </div>

      <form id="advisorForm">

        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="Enter your full name" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="Enter your phone number" required />
        </div>

        <div class="form-group">
          <label for="message">Message / Question</label>
          <textarea id="message" rows="5" placeholder="What would you like to talk about?" required></textarea>
        </div>

        <button type="submit" class="btn-submit">Send Message</button>

      </form>

      <div id="confirmation" class="confirmation" style="display:none;">
        <div class="confirm-icon">✓</div>
        <h3>Message Sent!</h3>
        <p>Thank you! One of our advisors will reach out to you soon.</p>
        <a href="index.html" class="btn-home">Back to Home</a>
      </div>

    </div>
  </div>

  <script src="advisor.js"></script>


</body>
</html>
