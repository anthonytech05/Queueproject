<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="Admin.css">
</head>
<body>

 <div class="wrapper">
  <a href="index.html" class="back-btn">Back to Home</a>
    <header>
      <h1>Admin Dashboard</h1>
      <div class="header-right">
        <span class="live-badge">● LIVE</span>
        <button class="btn-clear" onclick="clearAll()">Clear All</button>
      </div>
    </header>

    <div class="stats">
      <div class="stat-card">
        <p class="stat-label">Total Bookings</p>
        <p class="stat-value" id="statTotal">0</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Pending</p>
        <p class="stat-value" id="statPending">0</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Served</p>
        <p class="stat-value" id="statServed">0</p>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('Pending', this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('Served', this)">Served</button>
      <input class="search-input" type="text" id="searchInput" placeholder="Search name or queue no..." oninput="renderTable()"/>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Queue No.</th>
            <th>Full Name</th>
            <th>Branch</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="adminTable"></tbody>
      </table>
    </div>

    <p class="refresh-note">Auto-refreshes every 5 seconds</p>
  </div>

<script src="admin.js"></script>
</body>
</html>
